<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Chat with Reliable Notifications</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --msg-local: #312e81;
            --msg-remote: #334155;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .container {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            transition: all 0.3s ease;
            z-index: 10;
        }

        h2 { 
            font-size: 24px; 
            font-weight: 700; 
            margin-bottom: 24px; 
            text-align: center;
            letter-spacing: -0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0 16px 0;
            border-radius: 10px;
            border: 1px solid transparent;
            background-color: var(--bg-input);
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--accent); }
        input::placeholder { color: var(--text-muted); }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary { background-color: var(--accent); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); }

        .btn-danger {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--bg-input);
            padding: 8px 14px;
            width: auto;
            font-size: 13px;
            border-radius: 8px;
        }
        .btn-danger:hover { background-color: var(--danger); color: white; border-color: var(--danger); }
        
        /* Saved Rooms Section */
        .saved-rooms-section {
            margin-top: 24px;
            border-top: 1px solid var(--bg-input);
            padding-top: 20px;
        }

        .saved-rooms-section h4 {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .room-tags { display: flex; flex-direction: column; gap: 8px; }
        .room-tag-container { display: flex; gap: 8px; align-items: center; }

        .room-tag {
            background: var(--bg-input);
            color: var(--text-main);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex: 1;
        }

        .room-tag:hover { background: var(--accent); transform: translateY(-1px); }
        .room-tag .tag-code {
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .btn-delete-tag {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 18px;
            padding: 0;
            transition: all 0.2s ease;
        }
        .btn-delete-tag:hover { background: rgba(239, 68, 68, 0.15); color: var(--danger); border-color: rgba(239, 68, 68, 0.3); }

        /* Chat View Interface */
        #chat-view { display: none; flex-direction: column; height: 550px; }

        .chat-header { 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--bg-input);
            margin-bottom: 16px;
        }

        .room-info { display: flex; flex-direction: column; max-width: 70%; }
        .room-info .room-id { font-size: 18px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .room-info .user-id { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        #messages {
            flex: 1;
            border-radius: 12px;
            padding: 16px;
            overflow-y: auto;
            background: rgba(15, 23, 42, 0.4);
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message { padding: 10px 14px; border-radius: 12px; max-width: 85%; word-wrap: break-word; font-size: 15px; line-height: 1.4; }
        .message.local { background-color: var(--msg-local); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .message.remote { background-color: var(--msg-remote); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 2px; }

        .message-sender { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .message.local .message-sender { color: #a5b4fc; }

        .chat-input-area { display: flex; gap: 10px; align-items: center; }
        .chat-input-area input { margin: 0; flex: 1; }
        .chat-input-area button { margin: 0; width: auto; padding: 14px 24px; }

        /* Reliability Fix: Custom Global Notification Banner */
        .notification-banner {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: calc(100% - 40px);
            max-width: 440px;
            z-index: 9999;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .notification-banner.show { top: 20px; }
        .notification-banner .notif-title { font-weight: 700; font-size: 14px; }
        .notification-banner .notif-body { font-size: 13px; color: #e0e7ff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
</head>
<body>

<div id="custom-notification" class="notification-banner" onclick="dismissNotification()">
    <div class="notif-title" id="notif-title">New Message</div>
    <div class="notif-body" id="notif-body">Hello!</div>
</div>

<div class="container">
    <div id="login-view">
        <h2>Welcome</h2>
        
        <label for="username-input">Your Name</label>
        <input type="text" id="username-input" placeholder="Enter your name" autocomplete="off" required>
        
        <label for="room-name-input">Room Name (Optional)</label>
        <input type="text" id="room-name-input" placeholder="e.g., Chill Lounge, Gaming" autocomplete="off">

        <label for="room-input">Secret Room Code</label>
        <input type="text" id="room-input" placeholder="Enter connection code" autocomplete="off" required>
        
        <button class="btn-primary" onclick="joinRoom()">Connect & Join</button>

        <div class="saved-rooms-section" id="saved-section" style="display: none;">
            <h4>Quick Access Rooms</h4>
            <div class="room-tags" id="saved-rooms-list"></div>
        </div>
    </div>

    <div id="chat-view">
        <div class="chat-header">
            <div class="room-info">
                <span class="room-id" id="room-title">Room: ---</span>
                <span class="user-id" id="user-title">As: ---</span>
            </div>
            <button class="btn-danger" onclick="leaveRoom()">Leave Room</button>
        </div>
        
        <div id="messages"></div>
        
        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="Message room..." autocomplete="off" onkeypress="checkEnter(event)">
            <button class="btn-primary" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    const CLIENT_ID = 'Xj9aMZvB6pZOVHuz'; 
    let drone = null;
    let roomName = '';
    let username = '';
    let room = null;
    let currentCustomRoomName = '';
    let notifTimeout = null;

    // Synthetic audio alert generator (Requires no external audio file assets)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playNotificationSound() {
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5 note
            osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1);  // A5 note
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.3);
        } catch(e) { console.log("Audio play blocked by browser interaction policy"); }
    }

    document.addEventListener('DOMContentLoaded', () => {
        displaySavedRooms();
    });

    function requestNotificationPermission() {
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    }

    function joinRoom() {
        username = document.getElementById('username-input').value.trim();
        const roomCode = document.getElementById('room-input').value.trim();
        currentCustomRoomName = document.getElementById('room-name-input').value.trim();

        if (!username || !roomCode) {
            alert('Please fill out your name and a room code.');
            return;
        }

        if (!currentCustomRoomName) {
            currentCustomRoomName = "Room " + roomCode;
        }

        requestNotificationPermission();
        saveRoomData(roomCode, currentCustomRoomName);
        roomName = 'observable-' + roomCode;

        drone = new Scaledrone(CLIENT_ID, { data: { name: username } });

        drone.on('open', error => {
            if (error) return console.error(error);
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('chat-view').style.display = 'flex';
            document.getElementById('room-title').innerText = currentCustomRoomName;
            document.getElementById('user-title').innerText = `As ${username} | Code: ${roomCode}`;
            setupRoom();
        });
    }

    function setupRoom() {
        room = drone.subscribe(roomName);
        room.on('message', message => {
            const { data, member } = message;
            if (member) {
                const isLocal = member.id === drone.clientId;
                displayMessage(data.text, member.clientData.name, isLocal);
                
                // If message is remote, handle multi-layered alerting mechanisms
                if (!isLocal) {
                    playNotificationSound();
                    
                    // 1. Try standard Native System Notification (Works on HTTPS desktop)
                    if (document.hidden) {
                        triggerSystemNotification(member.clientData.name, data.text);
                    }
                    
                    // 2. Always show the custom In-App Banner if the user is out-of-tab or on mobile
                    if (document.hidden || mobileNotificationCondition()) {
                        showCustomBanner(member.clientData.name, data.text);
                    }
                }
            }
        });
    }

    function mobileNotificationCondition() {
        // Returns true if the user isn't directly scrolling the bottom logs area
        const msgDiv = document.getElementById('messages');
        return (msgDiv.scrollHeight - msgDiv.scrollTop - msgDiv.clientHeight > 150);
    }

    function triggerSystemNotification(sender, messageText) {
        if ('Notification' in window && Notification.permission === 'granted') {
            new Notification(`${sender} in ${currentCustomRoomName}`, {
                body: messageText,
                tag: 'chat-msg'
            });
        }
    }

    function showCustomBanner(sender, text) {
        clearTimeout(notifTimeout);
        document.getElementById('notif-title').innerText = `${sender} (${currentCustomRoomName})`;
        document.getElementById('notif-body').innerText = text;
        
        const banner = document.getElementById('custom-notification');
        banner.classList.add('show');

        // Automatically hide the alert bubble after 4 seconds
        notifTimeout = setTimeout(() => {
            banner.classList.remove('show');
        }, 4000);
    }

    function dismissNotification() {
        document.getElementById('custom-notification').classList.remove('show');
    }

    function sendMessage() {
        const msgInput = document.getElementById('message-input');
        const text = msgInput.value.trim();
        if (text === '') return;
        drone.publish({ room: roomName, message: { text: text } });
        msgInput.value = '';
    }

    function displayMessage(text, sender, isLocal) {
        const messagesDiv = document.getElementById('messages');
        const messageWrapper = document.createElement('div');
        messageWrapper.classList.add('message', isLocal ? 'local' : 'remote');
        messageWrapper.innerHTML = `<div class="message-sender">${sender}</div><div>${text}</div>`;
        messagesDiv.appendChild(messageWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function leaveRoom() {
        if (room) { room.unsubscribe(); room = null; }
        if (drone) { drone.close(); drone = null; }
        document.getElementById('messages').innerHTML = '';
        document.getElementById('chat-view').style.display = 'none';
        document.getElementById('login-view').style.display = 'block';
        displaySavedRooms();
    }

    function saveRoomData(code, displayName) {
        let rooms = JSON.parse(localStorage.getItem('chat_rooms_v2')) || [];
        rooms = rooms.filter(r => r.code !== code);
        rooms.unshift({ code: code, name: displayName });
        localStorage.setItem('chat_rooms_v2', JSON.stringify(rooms));
    }

    function deleteRoomData(code) {
        let rooms = JSON.parse(localStorage.getItem('chat_rooms_v2')) || [];
        rooms = rooms.filter(r => r.code !== code);
        localStorage.setItem('chat_rooms_v2', JSON.stringify(rooms));
        displaySavedRooms();
    }

    function displaySavedRooms() {
        const rooms = JSON.parse(localStorage.getItem('chat_rooms_v2')) || [];
        const section = document.getElementById('saved-section');
        const listDiv = document.getElementById('saved-rooms-list');
        
        if (rooms.length > 0) {
            section.style.display = 'block';
            listDiv.innerHTML = '';
            rooms.forEach(roomObj => {
                const row = document.createElement('div');
                row.className = 'room-tag-container';
                const tag = document.createElement('div');
                tag.className = 'room-tag';
                tag.innerHTML = `<span>${roomObj.name}</span> <span class="tag-code">${roomObj.code}</span>`;
                tag.onclick = () => {
                    document.getElementById('room-input').value = roomObj.code;
                    document.getElementById('room-name-input').value = roomObj.name;
                };
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-delete-tag';
                delBtn.innerHTML = '&times;';
                delBtn.onclick = (e) => { e.stopPropagation(); deleteRoomData(roomObj.code); };
                row.appendChild(tag);
                row.appendChild(delBtn);
                listDiv.appendChild(row);
            });
        } else { section.style.display = 'none'; }
    }

    function checkEnter(event) { if (event.key === 'Enter') sendMessage(); }
</script>
</body>
</html>
