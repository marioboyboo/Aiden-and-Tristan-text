<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Chat with Media Sharing</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --msg-local: #312e81;
            --msg-remote: #334155;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .container {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            transition: all 0.3s ease;
            z-index: 10;
        }

        h2 { 
            font-size: 24px; 
            font-weight: 700; 
            margin-bottom: 24px; 
            text-align: center;
            letter-spacing: -0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0 16px 0;
            border-radius: 10px;
            border: 1px solid transparent;
            background-color: var(--bg-input);
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--accent); }
        input::placeholder { color: var(--text-muted); }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary { background-color: var(--accent); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); }

        .btn-danger {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--bg-input);
            padding: 8px 14px;
            width: auto;
            font-size: 13px;
            border-radius: 8px;
        }
        .btn-danger:hover { background-color: var(--danger); color: white; border-color: var(--danger); }
        
        /* Saved Rooms Section */
        .saved-rooms-section {
            margin-top: 24px;
            border-top: 1px solid var(--bg-input);
            padding-top: 20px;
        }

        .saved-rooms-section h4 {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .room-tags { display: flex; flex-direction: column; gap: 8px; }
        .room-tag-container { display: flex; gap: 8px; align-items: center; }

        .room-tag {
            background: var(--bg-input);
            color: var(--text-main);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex: 1;
        }

        .room-tag:hover { background: var(--accent); transform: translateY(-1px); }
        .room-tag .tag-code {
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .btn-delete-tag {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 18px;
            padding: 0;
            transition: all 0.2s ease;
        }
        .btn-delete-tag:hover { background: rgba(239, 68, 68, 0.15); color: var(--danger); border-color: rgba(239, 68, 68, 0.3); }

        /* Chat View Interface */
        #chat-view { display: none; flex-direction: column; height: 550px; }

        .chat-header { 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--bg-input);
            margin-bottom: 16px;
        }

        .room-info { display: flex; flex-direction: column; max-width: 70%; }
        .room-info .room-id { font-size: 18px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .room-info .user-id { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        #messages {
            flex: 1;
            border-radius: 12px;
            padding: 16px;
            overflow-y: auto;
            background: rgba(15, 23, 42, 0.4);
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message { padding: 10px 14px; border-radius: 12px; max-width: 85%; word-wrap: break-word; font-size: 15px; line-height: 1.4; }
        .message.local { background-color: var(--msg-local); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .message.remote { background-color: var(--msg-remote); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 2px; }

        .message-sender { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .message.local .message-sender { color: #a5b4fc; }

        .shared-chat-image, .shared-chat-video {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 6px;
            display: block;
        }
        .shared-chat-image { cursor: pointer; transition: opacity 0.2s; }
        .shared-chat-image:hover { opacity: 0.9; }

        .chat-input-area { display: flex; gap: 8px; align-items: center; }
        .chat-input-area input { margin: 0; flex: 1; }
        
        .media-select-btn {
            width: 46px;
            height: 46px;
            background-color: var(--bg-input);
            color: var(--text-main);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .media-select-btn:hover { background-color: #475569; }
        #hidden-file-input { display: none; }

        .chat-input-area button.btn-send { margin: 0; width: auto; padding: 14px 20px; }

        /* Notification Toast Preview */
        .notification-toast {
            position: absolute;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            background: #4f46e5;
            color: white;
            padding: 16px 22px;
            border-radius: 14px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: calc(100% - 40px);
            max-width: 440px;
            z-index: 99999;
            border-left: 5px solid #a5b4fc;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .notification-toast.show { top: 24px; }
        .notification-toast .toast-header-text { font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #c7d2fe; }
        .notification-toast .toast-body-preview { font-size: 14px; font-weight: 500; line-height: 1.4; color: #f8fafc; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* NEW: Floating Download App Button Framework */
        .download-floating-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background-color: var(--accent);
            color: #fff;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, background-color 0.2s;
        }
        .download-floating-btn:hover { background-color: var(--accent-hover); transform: scale(1.03); }

        /* NEW: Download App Tile Drawer System */
        .download-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .download-modal-overlay.open { opacity: 1; pointer-events: auto; }

        .download-tile {
            background-color: var(--bg-card);
            border: 1px solid var(--bg-input);
            padding: 24px;
            border-radius: 16px;
            width: 90%;
            max-width: 340px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            position: relative;
            transform: scale(0.9);
            transition: transform 0.2s ease;
            text-align: center;
        }
        .download-modal-overlay.open .download-tile { transform: scale(1); }

        .close-tile-btn {
            position: absolute;
            top: 14px; right: 16px;
            background: none; border: none;
            color: var(--text-muted);
            font-size: 20px; cursor: pointer;
            width: auto; padding: 0;
        }
        .close-tile-btn:hover { color: var(--text-main); }

        .download-tile h3 { font-size: 18px; margin-bottom: 8px; font-weight: 700; }
        .download-tile p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.4; }
        .btn-exe-download { background-color: #10b981; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-exe-download:hover { background-color: #059669; }
    </style>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
</head>
<body>

<div id="chat-notification-toast" class="notification-toast" onclick="dismissNotification()">
    <div class="toast-header-text" id="toast-sender">New Message</div>
    <div class="toast-body-preview" id="toast-text">Preview text goes here...</div>
</div>

<div class="container">
    <div id="login-view">
        <h2>Welcome</h2>
        
        <label for="username-input">Your Name</label>
        <input type="text" id="username-input" placeholder="Enter your name" autocomplete="off" required>
        
        <label for="room-name-input">Room Name (Optional)</label>
        <input type="text" id="room-name-input" placeholder="e.g., Chill Lounge, Gaming" autocomplete="off">

        <label for="room-input">Secret Room Code</label>
        <input type="text" id="room-input" placeholder="Enter connection code" autocomplete="off" required>
        
        <button class="btn-primary" onclick="joinRoom()">Connect & Join</button>

        <div class="saved-rooms-section" id="saved-section" style="display: none;">
            <h4>Quick Access Rooms</h4>
            <div class="room-tags" id="saved-rooms-list"></div>
        </div>
    </div>

    <div id="chat-view">
        <div class="chat-header">
            <div class="room-info">
                <span class="room-id" id="room-title">Room: ---</span>
                <span class="user-id" id="user-title">As: ---</span>
            </div>
            <button class="btn-danger" onclick="leaveRoom()">Leave Room</button>
        </div>
        
        <div id="messages"></div>
        
        <div class="chat-input-area">
            <label class="media-select-btn" for="hidden-file-input">📁</label>
            <input type="file" id="hidden-file-input" accept="image/*,video/*" onchange="handleMediaUpload(event)">
            
            <input type="text" id="message-input" placeholder="Message room..." autocomplete="off" onkeypress="checkEnter(event)">
            <button class="btn-primary btn-send" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<div class="download-floating-btn" onclick="toggleDownloadTile(true)">
    <span>💻</span> Download App
</div>

<div id="download-overlay" class="download-modal-overlay" onclick="toggleDownloadTile(false)">
    <div class="download-tile" onclick="event.stopPropagation()">
        <button class="close-tile-btn" onclick="toggleDownloadTile(false)">&times;</button>
        <h3>Get Desktop Version</h3>
        <p>Run this chat directly from your computer for smoother desktop popups and global notifications.</p>
        <a href="#" id="exe-link" style="text-decoration: none;">
            <button class="btn-exe-download">📥 Download .EXE (Windows)</button>
        </a>
    </div>
</div>

<script>
    const CLIENT_ID = 'Xj9aMZvB6pZOVHuz'; 
    let drone = null;
    let roomName = '';
    let username = '';
    let room = null;
    let currentCustomRoomName = '';
    let toastTimeout = null;

    // NEW: Action helper to toggle the download interface state
    function toggleDownloadTile(shouldShow) {
        const overlay = document.getElementById('download-overlay');
        if (shouldShow) overlay.classList.add('open');
        else overlay.classList.remove('open');
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playLoudNotificationSound() {
        try {
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc1.connect(gainNode);
            osc2.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc1.type = 'triangle';
            osc2.type = 'sine';
            
            osc1.frequency.setValueAtTime(659.25, audioCtx.currentTime);
            osc1.frequency.setValueAtTime(987.77, audioCtx.currentTime + 0.08);
            
            osc2.frequency.setValueAtTime(523.25, audioCtx.currentTime);
            osc2.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.08);
            
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
            
            osc1.start(audioCtx.currentTime);
            osc2.start(audioCtx.currentTime);
            
            osc1.stop(audioCtx.currentTime + 0.35);
            osc2.stop(audioCtx.currentTime + 0.35);
        } catch(e) { console.log("Audio play deferred."); }
    }

    document.addEventListener('DOMContentLoaded', () => {
        displaySavedRooms();
    });

    function requestNotificationPermission() {
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    }

    function joinRoom() {
        username = document.getElementById('username-input').value.trim();
        const roomCode = document.getElementById('room-input').value.trim();
        currentCustomRoomName = document.getElementById('room-name-input').value.trim();

        if (!username || !roomCode) {
            alert('Please fill out your name and a room code.');
            return;
        }

        if (!currentCustomRoomName) {
            currentCustomRoomName = "Room " + roomCode;
        }

        requestNotificationPermission();
        saveRoomData(roomCode, currentCustomRoomName, username);
        roomName = 'observable-' + roomCode;

        drone = new Scaledrone(CLIENT_ID, { data: { name: username } });

        drone.on('open', error => {
            if (error) return console.error(error);
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('chat-view').style.display = 'flex';
            document.getElementById('room-title').innerText = currentCustomRoomName;
            document.getElementById('user-title').innerText = `As ${username} | Code: ${roomCode}`;
            setupRoom();
        });
    }

    function setupRoom() {
        room = drone.subscribe(roomName, {
            historyCount: 50 
        });

        room.on('history_message', message => {
            const { data, member } = message;
            if (member) {
                const isLocal = member.id === drone.clientId;
                displayMessage(data.text, member.clientData.name, isLocal, data.image, data.video);
            } else {
                displayMessage(data.text, 'System', false);
            }
        });

        room.on('message', message => {
            const { data, member } = message;
            if (member) {
                const isLocal = member.id === drone.clientId;
                displayMessage(data.text, member.clientData.name, isLocal, data.image, data.video);
                
                if (!isLocal) {
                    playLoudNotificationSound();
                    
                    let previewContent = data.text;
                    if (!previewContent) {
                        if (data.video) previewContent = "Sent a video 🎬";
                        else if (data.image) previewContent = "Sent a photo 📷";
                    }

                    if (document.hidden) {
                        triggerSystemNotification(member.clientData.name, previewContent);
                    }
                    if (document.hidden || mobileNotificationCondition()) {
                        showPreviewToast(member.clientData.name, previewContent);
                    }
                }
            }
        });
    }

    function handleMediaUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        if (file.type.startsWith('video/')) {
            const reader = new FileReader();
            reader.onload = function(e) {
                drone.publish({
                    room: roomName,
                    message: { text: '', video: e.target.result }
                });
            };
            reader.readAsDataURL(file);
        } else {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max_size = 800;

                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const base64Data = canvas.toDataURL('image/jpeg', 0.7);
                    drone.publish({
                        room: roomName,
                        message: { text: '', image: base64Data }
                    });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        event.target.value = '';
    }

    function mobileNotificationCondition() {
        const msgDiv = document.getElementById('messages');
        return (msgDiv.scrollHeight - msgDiv.scrollTop - msgDiv.clientHeight > 150);
    }

    function triggerSystemNotification(sender, messageText) {
        if ('Notification' in window && Notification.permission === 'granted') {
            new Notification(`${sender} inside ${currentCustomRoomName}`, {
                body: messageText,
                tag: 'chat-msg'
            });
        }
    }

    function showPreviewToast(sender, text) {
        clearTimeout(toastTimeout);
        document.getElementById('toast-sender').innerText = `Message from ${sender} (${currentCustomRoomName})`;
        document.getElementById('toast-text').innerText = text;
        
        const toast = document.getElementById('chat-notification-toast');
        toast.classList.add('show');

        toastTimeout = setTimeout(() => {
            toast.classList.remove('show');
        },
