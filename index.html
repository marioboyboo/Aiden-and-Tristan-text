<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Chat with Permissions Sharing</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --msg-local: #312e81;
            --msg-remote: #334155;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            
            /* Role Colors */
            --color-owner: #f59e0b;
            --color-mod: #3b82f6;
            --color-member: #10b981;
            --color-visitor: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .container {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 760px; /* Widened layout to comfortably feature User Directory panel */
            transition: all 0.3s ease;
            z-index: 10;
        }

        .app-layout {
            display: flex;
            gap: 24px;
        }

        .main-chat-area {
            flex: 1;
        }

        /* User List Sidebar Panel */
        .user-directory-panel {
            width: 220px;
            border-left: 1px solid var(--bg-input);
            padding-left: 20px;
            display: flex;
            flex-direction: column;
        }

        #login-view { width: 100%; max-width: 440px; margin: 0 auto; }

        h2 { 
            font-size: 24px; 
            font-weight: 700; 
            margin-bottom: 24px; 
            text-align: center;
            letter-spacing: -0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0 16px 0;
            border-radius: 10px;
            border: 1px solid transparent;
            background-color: var(--bg-input);
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--accent); }
        input::placeholder { color: var(--text-muted); }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary { background-color: var(--accent); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); }

        .btn-danger {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--bg-input);
            padding: 8px 14px;
            width: auto;
            font-size: 13px;
            border-radius: 8px;
        }
        .btn-danger:hover { background-color: var(--danger); color: white; border-color: var(--danger); }
        
        .saved-rooms-section {
            margin-top: 24px;
            border-top: 1px solid var(--bg-input);
            padding-top: 20px;
        }

        .saved-rooms-section h4 {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .room-tags { display: flex; flex-direction: column; gap: 8px; }
        .room-tag-container { display: flex; gap: 8px; align-items: center; }

        .room-tag {
            background: var(--bg-input);
            color: var(--text-main);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex: 1;
        }

        .room-tag:hover { background: var(--accent); transform: translateY(-1px); }
        .room-tag .tag-code {
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .btn-delete-tag {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 18px;
            padding: 0;
            transition: all 0.2s ease;
        }
        .btn-delete-tag:hover { background: rgba(239, 68, 68, 0.15); color: var(--danger); border-color: rgba(239, 68, 68, 0.3); }

        /* Chat View Interface Layout */
        #chat-view { display: none; width: 100%; }

        .chat-header { 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--bg-input);
            margin-bottom: 16px;
        }

        .room-info { display: flex; flex-direction: column; max-width: 70%; }
        .room-info .room-id { font-size: 18px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .room-info .user-id { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        #messages {
            height: 400px;
            border-radius: 12px;
            padding: 16px;
            overflow-y: auto;
            background: rgba(15, 23, 42, 0.4);
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message { padding: 10px 14px; border-radius: 12px; max-width: 85%; word-wrap: break-word; font-size: 15px; line-height: 1.4; }
        .message.local { background-color: var(--msg-local); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .message.remote { background-color: var(--msg-remote); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 2px; }

        .message-sender { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
        .message.local .message-sender { color: #a5b4fc; }

        /* Role Badges Display */
        .badge {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
        }
        .badge.owner { background-color: var(--color-owner); }
        .badge.mod { background-color: var(--color-mod); }
        .badge.member { background-color: var(--color-member); }
        .badge.visitor { background-color: var(--color-visitor); }

        /* User Directory Elements */
        .directory-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; }
        .user-list-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        
        .user-row {
            background: rgba(15, 23, 42, 0.3);
            padding: 8px 10px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 13px;
        }
        .user-row-meta { display: flex; justify-content: space-between; align-items: center; }
        .user-row-actions { display: flex; gap: 4px; margin-top: 2px; }
        
        .action-mini-btn {
            padding: 3px 6px;
            font-size: 10px;
            border-radius: 4px;
            width: auto;
            background: var(--bg-input);
            color: var(--text-main);
        }
        .action-mini-btn:hover { background: var(--accent); }
        .action-mini-btn.danger-action:hover { background: var(--danger); }

        .shared-chat-image, .shared-chat-video {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 6px;
            display: block;
        }

        .link-preview-card {
            display: block;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-top: 6px;
            text-decoration: none;
            color: inherit;
        }
        .link-preview-card:hover { border-color: var(--accent); }
        .link-preview-title { font-size: 12px; font-weight: 700; color: #a5b4fc; text-transform: uppercase; margin-bottom: 2px; }
        .link-preview-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .link-preview-url { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .chat-input-area { display: flex; gap: 8px; align-items: center; }
        .chat-input-area input { margin: 0; flex: 1; }
        
        .media-select-btn {
            width: 46px;
            height: 46px;
            background-color: var(--bg-input);
            color: var(--text-main);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
        }
        #hidden-file-input { display: none; }
        .chat-input-area button.btn-send { margin: 0; width: auto; padding: 14px 20px; }

        .notification-toast {
            position: absolute;
            top: -120px; left: 50%; transform: translateX(-50%);
            background: #4f46e5; color: white; padding: 16px 22px; border-radius: 14px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column; gap: 6px; width: calc(100% - 40px); max-width: 440px; z-index: 99999;
            transition: top 0.4s; cursor: pointer;
        }
        .notification-toast.show { top: 24px; }

        .download-floating-btn {
            position: fixed; bottom: 24px; right: 24px;
            background-color: var(--accent); color: #fff; padding: 12px 20px; border-radius: 50px;
            font-size: 14px; font-weight: 600; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            cursor: pointer; z-index: 100; display: flex; align-items: center; gap: 8px;
        }

        .download-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
        }
        .download-modal-overlay.open { opacity: 1; pointer-events: auto; }
        .download-tile { background-color: var(--bg-card); padding: 24px; border-radius: 16px; width: 90%; max-width: 340px; text-align: center; position: relative; }
        .close-tile-btn { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }
        .btn-exe-download { display: block; width: 100%; background-color: #10b981; color: white; padding: 14px; border-radius: 10px; text-decoration: none; font-size: 15px; font-weight: 600; border: none; }
    </style>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
</head>
<body>

<div id="chat-notification-toast" class="notification-toast" onclick="dismissNotification()">
    <div class="toast-header-text" id="toast-sender">New Message</div>
    <div class="toast-body-preview" id="toast-text">Preview text goes here...</div>
</div>

<div class="container">
    <div id="login-view">
        <h2>Welcome</h2>
        <label for="username-input">Your Name</label>
        <input type="text" id="username-input" placeholder="Enter your name" autocomplete="off" required>
        
        <label for="room-name-input">Room Name (Optional)</label>
        <input type="text" id="room-name-input" placeholder="e.g., Chill Lounge" autocomplete="off">

        <label for="room-input">Secret Room Code</label>
        <input type="text" id="room-input" placeholder="Enter connection code" autocomplete="off" required>
        
        <button class="btn-primary" onclick="joinRoom()">Connect & Join</button>

        <div class="saved-rooms-section" id="saved-section" style="display: none;">
            <h4>Quick Access Rooms</h4>
            <div class="room-tags" id="saved-rooms-list"></div>
        </div>
    </div>

    <div id="chat-view">
        <div class="chat-header">
            <div class="room-info">
                <span class="room-id" id="room-title">Room: ---</span>
                <span class="user-id" id="user-title">As: ---</span>
            </div>
            <button class="btn-danger" onclick="leaveRoom()">Leave Room</button>
        </div>
        
        <div class="app-layout">
            <div class="main-chat-area">
                <div id="messages"></div>
                
                <div class="chat-input-area">
                    <label class="media-select-btn" id="media-btn-label" for="hidden-file-input">📁</label>
                    <input type="file" id="hidden-file-input" accept="image/*,video/*" onchange="handleMediaUpload(event)">
                    
                    <input type="text" id="message-input" placeholder="You are a visitor. View only..." autocomplete="off" onkeypress="checkEnter(event)" disabled>
                    <button class="btn-primary btn-send" id="send-msg-btn" onclick="sendMessage()" disabled>Send</button>
                </div>
            </div>

            <div class="user-directory-panel">
                <div class="directory-title">Room Users</div>
                <div class="user-list-container" id="user-list-box"></div>
            </div>
        </div>
    </div>
</div>

<div class="download-floating-btn" id="floating-dl-btn">
    <span>💻</span> Download App
</div>

<div id="download-overlay" class="download-modal-overlay">
    <div class="download-tile" id="download-tile-content">
        <button class="close-tile-btn" id="close-dl-btn">&times;</button>
        <h3>Get Desktop Version</h3>
        <p>Run this chat directly from your computer for smoother desktop popups.</p>
        <button class="btn-exe-download" id="start-exe-dl">📥 Download .EXE (Windows)</button>
    </div>
</div>

<script>
    const CLIENT_ID = 'Xj9aMZvB6pZOVHuz'; 
    let drone = null;
    let roomName = '';
    let username = '';
    let room = null;
    let currentCustomRoomName = '';
    let toastTimeout = null;
    let audioCtx = null;

    // Roles Hierarchy Management Matrix
    const ROLES = { OWNER: 'owner', MODERATOR: 'moderator', MEMBER: 'member', VISITOR: 'visitor' };
    let myCurrentRole = ROLES.VISITOR; 
    let activeUsersMap = {}; // Tracks local directory instances inside room channel

    function initAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    document.getElementById('floating-dl-btn').addEventListener('click', () => document.getElementById('download-overlay').classList.add('open'));
    document.getElementById('close-dl-btn').addEventListener('click', () => document.getElementById('download-overlay').classList.remove('open'));
    document.getElementById('download-overlay').addEventListener('click', () => document.getElementById('download-overlay').classList.remove('open'));
    document.getElementById('download-tile-content').addEventListener('click', (e) => e.stopPropagation());

    function joinRoom() {
        initAudioContext();
        username = document.getElementById('username-input').value.trim();
        const roomCode = document.getElementById('room-input').value.trim();
        currentCustomRoomName = document.getElementById('room-name-input').value.trim() || "Room " + roomCode;

        if (!username || !roomCode) {
            alert('Please fill out your name and a room code.');
            return;
        }

        saveRoomData(roomCode, currentCustomRoomName, username);
        roomName = 'observable-' + roomCode;

        drone = new Scaledrone(CLIENT_ID, { data: { name: username, initialRole: ROLES.VISITOR } });

        drone.on('open', error => {
            if (error) return console.error(error);
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('chat-view').style.display = 'flex';
            document.getElementById('room-title').innerText = currentCustomRoomName;
            setupRoom();
        });
    }

    function setupRoom() {
        room = drone.subscribe(roomName, { historyCount: 30 });

        room.on('members', members => {
            // If you are the first entity entering an empty stream, you claim Owner privileges automatically
            if (members.length === 1) {
                myCurrentRole = ROLES.OWNER;
            }
            
            members.forEach(m => {
                activeUsersMap[m.id] = {
                    id: m.id,
                    name: m.clientData.name,
                    role: m.id === drone.clientId ? myCurrentRole : ROLES.VISITOR
                };
            });
            
            broadcastSystemHandshake();
            updateInterfacePermissions();
        });

        room.on('member_join', member => {
            activeUsersMap[member.id] = { id: member.id, name: member.clientData.name, role: ROLES.VISITOR };
            
            // FIX: Only the Owner or a Moderator broadcasts the state update.
            // This prevents a freshly joined visitor from overwriting existing room states.
            if (myCurrentRole === ROLES.OWNER || myCurrentRole === ROLES.MODERATOR) {
                broadcastSystemHandshake(); 
            }
            updateInterfacePermissions();
        });

        room.on('member_leave', member => {
            delete activeUsersMap[member.id];
            updateInterfacePermissions();
        });

        room.on('message', message => {
            const { data, member } = message;
            
            if (data.systemSignal) {
                handleSystemSignal(data.systemSignal);
                return;
            }

            if (member) {
                const isLocal = member.id === drone.clientId;
                const senderRole = activeUsersMap[member.id]?.role || ROLES.VISITOR;
                displayMessage(data.text, member.clientData.name, isLocal, senderRole, data.image, data.video);
            }
        });
    }

    function broadcastSystemHandshake() {
        if (!drone) return;
        drone.publish({
            room: roomName,
            message: { systemSignal: { type: 'SYNC_ROLES', rolesState: activeUsersMap } }
        });
    }

    function handleSystemSignal(signal) {
        if (signal.type === 'SYNC_ROLES') {
            Object.keys(signal.rolesState).forEach(clientId => {
                if (activeUsersMap[clientId]) {
                    // FIX: Prevent overwriting the room's Owner status.
                    // If a client is already established as Owner, do not let an incoming sync downgrade them.
                    if (activeUsersMap[clientId].role === ROLES.OWNER && signal.rolesState[clientId].role !== ROLES.OWNER) {
                        return; 
                    }
                    activeUsersMap[clientId].role = signal.rolesState[clientId].role;
                }
            });
            
            if (activeUsersMap[drone.clientId]) {
                myCurrentRole = activeUsersMap[drone.clientId].role;
            }
            updateInterfacePermissions();
        } 
        else if (signal.type === 'ALTER_ROLE' && signal.targetId === drone.clientId) {
            myCurrentRole = signal.newRole;
            activeUsersMap[drone.clientId].role = myCurrentRole;
            alert(`Your permission status has been updated to: ${myCurrentRole.toUpperCase()}`);
            updateInterfacePermissions();
            broadcastSystemHandshake();
        } 
        else if (signal.type === 'BAN_USER' && signal.targetId === drone.clientId) {
            alert("You have been banned from this room by an administrator.");
            leaveRoom();
        }
    }

    function updateInterfacePermissions() {
        const msgInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-msg-btn');
        const mediaLabel = document.getElementById('media-btn-label');
        const userTitle = document.getElementById('user-title');

        userTitle.innerText = `As ${username} (${myCurrentRole.toUpperCase()})`;

        const canWrite = (myCurrentRole !== ROLES.VISITOR);
        
        msgInput.disabled = !canWrite;
        sendBtn.disabled = !canWrite;
        
        if (canWrite) {
            msgInput.placeholder = "Message room...";
            mediaLabel.style.pointerEvents = "auto";
            mediaLabel.style.opacity = "1";
        } else {
            msgInput.placeholder = "You are a visitor. View only...";
            mediaLabel.style.pointerEvents = "none";
            mediaLabel.style.opacity = "0.4";
        }

        renderUserDirectory();
    }

    function renderUserDirectory() {
        const container = document.getElementById('user-list-box');
        container.innerHTML = '';

        Object.values(activeUsersMap).forEach(user => {
            const isMe = user.id === drone.clientId;
            const row = document.createElement('div');
            row.className = 'user-row';

            const canInvite = (myCurrentRole === ROLES.OWNER || myCurrentRole === ROLES.MODERATOR || myCurrentRole === ROLES.MEMBER);
            const displayCodeTag = canInvite ? `<span style="font-size:10px; color:var(--text-muted);">ID: ${user.id.substring(0,4)}</span>` : '';

            let actionButtonsHTML = '';
            
            if (!isMe) {
                if (myCurrentRole === ROLES.OWNER) {
                    if (user.role !== ROLES.MODERATOR) {
                        actionButtonsHTML += `<button class="action-mini-btn" onclick="changeUserRole('${user.id}', '${ROLES.MODERATOR}')">+Mod</button>`;
                    } else {
                        actionButtonsHTML += `<button class="action-mini-btn danger-action" onclick="changeUserRole('${user.id}', '${ROLES.VISITOR}')">-Mod</button>`;
                    }
                    if (user.role !== ROLES.MEMBER) {
                        actionButtonsHTML += `<button class="action-mini-btn" onclick="changeUserRole('${user.id}', '${ROLES.MEMBER}')">+Member</button>`;
                    }
                    actionButtonsHTML += `<button class="action-mini-btn danger-action" onclick="banUser('${user.id}')">Ban</button>`;
                } 
                else if (myCurrentRole === ROLES.MODERATOR && user.role !== ROLES.OWNER && user.role !== ROLES.MODERATOR) {
                    if (user.role !== ROLES.MEMBER) {
                        actionButtonsHTML += `<button class="action-mini-btn" onclick="changeUserRole('${user.id}', '${ROLES.MEMBER}')">+Member</button>`;
                    }
                    actionButtonsHTML += `<button class="action-mini-btn danger-action" onclick="banUser('${user.id}')">Ban</button>`;
                }
            }

            row.innerHTML = `
                <div class="user-row-meta">
                    <span style="font-weight:600; color:${isMe ? '#a5b4fc' : 'inherit'}">${user.name} ${isMe ? '(You)' : ''}</span>
                    <span class="badge ${user.role}">${user.role}</span>
                </div>
                ${displayCodeTag}
                <div class="user-row-actions">${actionButtonsHTML}</div>
            `;
            container.appendChild(row);
        });
    }

    function changeUserRole(targetClientId, newRoleName) {
        drone.publish({
            room: roomName,
            message: { systemSignal: { type: 'ALTER_ROLE', targetId: targetClientId, newRole: newRoleName } }
        });
    }

    function banUser(targetClientId) {
        if (confirm("Are you sure you want to ban this user from the room?")) {
            drone.publish({
                room: roomName,
                message: { systemSignal: { type: 'BAN_USER', targetId: targetClientId } }
            });
        }
    }

    function sendMessage() {
        if (myCurrentRole === ROLES.VISITOR) return;
        const msgInput = document.getElementById('message-input');
        const text = msgInput.value.trim();
        if (text === '') return;
        drone.publish({ room: roomName, message: { text: text } });
        msgInput.value = '';
    }

    function handleMediaUpload(event) {
        if (myCurrentRole === ROLES.VISITOR) {
            alert("Visitors aren't permitted to distribute attachments.");
            return;
        }
        const file = event.target.files[0];
        if (!file) return;

        const MAX_VIDEO_SIZE = 4 * 1024 * 1024; 
        if (file.size > MAX_VIDEO_SIZE) {
            alert(`This video file is too large. Keep media uploads under 4MB.`);
            event.target.value = '';
            return;
        }

        if (file.type.startsWith('video/')) {
            const reader = new FileReader();
            reader.onload = function(e) {
                drone.publish({ room: roomName, message: { text: '', video: e.target.result } });
            };
            reader.readAsDataURL(file);
        } else {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    const max_size = 800;
                    if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } } 
                    else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    drone.publish({ room: roomName, message: { text: '', image: canvas.toDataURL('image/jpeg', 0.7) } });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        event.target.value = '';
    }

    function displayMessage(text, sender, isLocal, senderRole, base64Image = null, base64Video = null) {
        const messagesDiv = document.getElementById('messages');
        const messageWrapper = document.createElement('div');
        messageWrapper.classList.add('message', isLocal ? 'local' : 'remote');
        
        let messageHTML = `
            <div class="message-sender">
                <span>${sender}</span>
                <span class="badge ${senderRole}">${senderRole}</span>
            </div>
        `;
        
        const urlRegex = /(https?:\/\/[^\s]+)/g;

        if (text) {
            if (urlRegex.test(text)) {
                const matchedUrl = text.match(urlRegex)[0];
                const siteName = extractHostname(matchedUrl);
                messageHTML += `
                    <div style="margin-bottom: 4px;">${text.replace(matchedUrl, '')}</div>
                    <a href="${matchedUrl}" target="_blank" rel="noopener noreferrer" class="link-preview-card">
                        <div class="link-preview-title">🔗 External Link</div>
                        <div class="link-preview-name">${siteName}</div>
                        <div class="link-preview-url">${matchedUrl}</div>
                    </a>
                `;
            } else { messageHTML += `<div>${text}</div>`; }
        }
        
        if (base64Image) messageHTML += `<img src="${base64Image}" class="shared-chat-image" alt="Shared image node" onclick="window.open(this.src)">`;
        if (base64Video) messageHTML += `<video src="${base64Video}" class="shared-chat-video" controls loop playsinline preload="metadata"></video>`;
        
        messageWrapper.innerHTML = messageHTML;
        messagesDiv.appendChild(messageWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function extractHostname(url) {
        try { return new URL(url).hostname.replace('www.', ''); } catch(e) { return "Visit External Site"; }
    }

    function leaveRoom() {
        if (room) { room.unsubscribe(); room = null; }
        if (drone) { drone.close(); drone = null; }
        document.getElementById('messages').innerHTML = '';
        document.getElementById('chat-view').style.display = 'none';
        document.getElementById('login-view').style.display = 'block';
        activeUsersMap = {};
        myCurrentRole = ROLES.VISITOR;
        displaySavedRooms();
    }

    function saveRoomData(code, displayName, savedName) {
        let rooms = JSON.parse(localStorage.getItem('chat_rooms_v3')) || [];
        rooms = rooms.filter(r => r.code !== code);
        rooms.unshift({ code: code, name: displayName, username: savedName });
        localStorage.setItem('chat_rooms_v3', JSON.stringify(rooms));
    }

    function deleteRoomData(code) {
        let rooms = JSON.parse(localStorage.getItem('chat_rooms_v3')) || [];
        rooms = rooms.filter(r => r.code !== code);
        localStorage.setItem('chat_rooms_v3', JSON.stringify(rooms));
        displaySavedRooms();
    }

    function displaySavedRooms() {
        const rooms = JSON.parse(localStorage.getItem('chat_rooms_v3')) || [];
        const section = document.getElementById('saved-section');
        const listDiv = document.getElementById('saved-rooms-list');
        
        if (rooms.length > 0) {
            section.style.display = 'block';
            listDiv.innerHTML = '';
            rooms.forEach(roomObj => {
                const row = document.createElement('div');
                row.className = 'room-tag-container';
                const tag = document.createElement('div');
                tag.className = 'room-tag';
                tag.innerHTML = `<span>${roomObj.name}</span> <span class="tag-code">${roomObj.code}</span>`;
                
                tag.onclick = () => {
                    document.getElementById('room-input').value = roomObj.code;
                    document.getElementById('room-name-input').value = roomObj.name;
                    document.getElementById('username-input').value = roomObj.username || '';
                };
                
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-delete-tag';
                delBtn.innerHTML = '&times;';
                delBtn.onclick = (e) => { e.stopPropagation(); deleteRoomData(roomObj.code); };
                row.appendChild(tag);
                row.appendChild(delBtn);
                listDiv.appendChild(row);
            });
        } else { section.style.display = 'none'; }
    }

    function checkEnter(event) { 
        if (event.key === 'Enter') sendMessage(); 
    }
</script>
</body>
</html>
