<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Chat</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --msg-local: #312e81;
            --msg-remote: #334155;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            transition: all 0.3s ease;
        }

        h2 { 
            font-size: 24px; 
            font-weight: 700; 
            margin-bottom: 24px; 
            text-align: center;
            letter-spacing: -0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0 16px 0;
            border-radius: 10px;
            border: 1px solid transparent;
            background-color: var(--bg-input);
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
        }

        .btn-primary:hover { 
            background-color: var(--accent-hover); 
        }

        .btn-danger {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--bg-input);
            padding: 8px 14px;
            width: auto;
            font-size: 13px;
            border-radius: 8px;
        }

        .btn-danger:hover {
            background-color: var(--danger);
            color: white;
            border-color: var(--danger);
        }
        
        /* Saved Rooms Section */
        .saved-rooms-section {
            margin-top: 24px;
            border-top: 1px solid var(--bg-input);
            padding-top: 20px;
        }

        .saved-rooms-section h4 {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .room-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .room-tag {
            background: var(--bg-input);
            color: var(--text-main);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s, transform 0.1s;
        }

        .room-tag:hover {
            background: var(--accent);
            transform: translateY(-1px);
        }

        /* Chat View Interface */
        #chat-view { 
            display: none; 
            flex-direction: column; 
            height: 550px; 
        }

        .chat-header { 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--bg-input);
            margin-bottom: 16px;
        }

        .room-info {
            display: flex;
            flex-direction: column;
        }

        .room-info .room-id {
            font-size: 16px;
            font-weight: 700;
        }

        .room-info .user-id {
            font-size: 12px;
            color: var(--text-muted);
        }

        #messages {
            flex: 1;
            border-radius: 12px;
            padding: 16px;
            overflow-y: auto;
            background: rgba(15, 23, 42, 0.4);
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }

        .message.local { 
            background-color: var(--msg-local); 
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message.remote { 
            background-color: var(--msg-remote); 
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .message-sender {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message.local .message-sender {
            color: #a5b4fc;
        }

        .chat-input-area { 
            display: flex; 
            gap: 10px; 
            align-items: center;
        }

        .chat-input-area input { 
            margin: 0; 
            flex: 1; 
        }

        .chat-input-area button { 
            margin: 0; 
            width: auto; 
            padding: 14px 24px; 
        }
    </style>
    <!-- Scaledrone JavaScript API referenced via Screenshot 2026-06-12 213127.png config -->
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
</head>
<body>

<div class="container">
    <!-- Screen 1: Lobby / Join Room -->
    <div id="login-view">
        <h2>Welcome</h2>
        
        <label for="username-input">Your Name</label>
        <input type="text" id="username-input" placeholder="Enter your name" autocomplete="off" required>
        
        <label for="room-input">Room Code</label>
        <input type="text" id="room-input" placeholder="Enter secret room code" autocomplete="off" required>
        
        <button class="btn-primary" onclick="joinRoom()">Connect & Join</button>

        <!-- Saved Rooms History List -->
        <div class="saved-rooms-section" id="saved-section" style="display: none;">
            <h4>Quick Access Rooms</h4>
            <div class="room-tags" id="saved-rooms-list"></div>
        </div>
    </div>

    <!-- Screen 2: The Chat Interface -->
    <div id="chat-view">
        <div class="chat-header">
            <div class="room-info">
                <span class="room-id" id="room-title">Room: ---</span>
                <span class="user-id" id="user-title">As: ---</span>
            </div>
            <button class="btn-danger" onclick="leaveRoom()">Leave Room</button>
        </div>
        
        <div id="messages"></div>
        
        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="Message room..." autocomplete="off" onkeypress="checkEnter(event)">
            <button class="btn-primary" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    // Channel ID verified from Screenshot 2026-06-12 213127.png
    const CLIENT_ID = 'Xj9aMZvB6pZOVHuz'; 
    let drone = null;
    let roomName = '';
    let username = '';
    let room = null;

    // Load saved rooms when the page opens
    document.addEventListener('DOMContentLoaded', () => {
        displaySavedRooms();
    });

    function joinRoom() {
        username = document.getElementById('username-input').value.trim();
        const roomCode = document.getElementById('room-input').value.trim();

        if (!username || !roomCode) {
            alert('Please fill out your name and a room code.');
            return;
        }

        // Save room code to local storage history
        saveRoomCode(roomCode);

        // Scaledrone dynamic room identifier mapping
        roomName = 'observable-' + roomCode;

        // Initialize active connection
        drone = new Scaledrone(CLIENT_ID, {
            data: { name: username }
        });

        drone.on('open', error => {
            if (error) return console.error(error);
            
            // Seamless UI Switch transition
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('chat-view').style.display = 'flex';
            document.getElementById('room-title').innerText = `Room: ${roomCode}`;
            document.getElementById('user-title').innerText = `Logged in as ${username}`;

            setupRoom();
        });

        drone.on('error', error => console.error('Connection error:', error));
    }

    function setupRoom() {
        room = drone.subscribe(roomName);

        room.on('message', message => {
            const { data, member } = message;
            if (member) {
                displayMessage(data.text, member.clientData.name, member.id === drone.clientId);
            } else {
                displayMessage(data.text, 'System', false);
            }
        });
    }

    function sendMessage() {
        const msgInput = document.getElementById('message-input');
        const text = msgInput.value.trim();
        if (text === '') return;

        drone.publish({
            room: roomName,
            message: { text: text }
        });

        msgInput.value = '';
    }

    function displayMessage(text, sender, isLocal) {
        const messagesDiv = document.getElementById('messages');
        const messageWrapper = document.createElement('div');
        messageWrapper.classList.add('message', isLocal ? 'local' : 'remote');
        
        // Structure name on top, text underneath for a sleeker presentation
        messageWrapper.innerHTML = `<div class="message-sender">${sender}</div><div>${text}</div>`;
        
        messagesDiv.appendChild(messageWrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // New Functionality: Safely unsubscribe and tear down Scaledrone connection
    function leaveRoom() {
        if (room) {
            room.unsubscribe();
            room = null;
        }
        if (drone) {
            drone.close();
            drone = null;
        }

        // Clear out old message logs completely
        document.getElementById('messages').innerHTML = '';
        document.getElementById('message-input').value = '';

        // Swap interface back to the entry menu view safely
        document.getElementById('chat-view').style.display = 'none';
        document.getElementById('login-view').style.display = 'block';
        
        // Refresh the saved room tags list in case changes happened
        displaySavedRooms();
    }

    function saveRoomCode(code) {
        let rooms = JSON.parse(localStorage.getItem('chat_rooms')) || [];
        if (!rooms.includes(code)) {
            rooms.push(code);
            localStorage.setItem('chat_rooms', JSON.stringify(rooms));
        }
    }

    function displaySavedRooms() {
        const rooms = JSON.parse(localStorage.getItem('chat_rooms')) || [];
        const section = document.getElementById('saved-section');
        const listDiv = document.getElementById('saved-rooms-list');
        
        if (rooms.length > 0) {
            section.style.display = 'block';
            listDiv.innerHTML = '';
            rooms.forEach(roomCode => {
                const tag = document.createElement('span');
                tag.className = 'room-tag';
                tag.innerText = roomCode;
                tag.onclick = () => {
                    document.getElementById('room-input').value = roomCode;
                };
                listDiv.appendChild(tag);
            });
        }
    }

    function checkEnter(event) {
        if (event.key === 'Enter') sendMessage();
    }
</script>

</body>
</html>
