<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tristan Text Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 20px; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            background-color: #5856d6;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #4543b3; }
        
        /* Saved Rooms Styles */
        .saved-rooms-section {
            margin-top: 15px;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .saved-rooms-section h4 {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .room-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .room-tag {
            background: #eef0f6;
            color: #5856d6;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        .room-tag:hover {
            background: #e1e4f5;
        }

        /* Chat View Styles */
        #chat-view { display: none; flex-direction: column; height: 500px; text-align: left; }
        #messages {
            flex: 1;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            background: #fafafa;
            margin-bottom: 10px;
        }
        .message {
            margin-bottom: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .message.local { background-color: #d1e7dd; margin-left: auto; }
        .message.remote { background-color: #e2e3e5; }
        .room-header { font-size: 14px; color: #666; margin-bottom: 10px; font-weight: 600; }
        .chat-input-area { display: flex; gap: 8px; }
        .chat-input-area input { margin: 0; flex: 1; }
        .chat-input-area button { margin: 0; width: auto; padding: 0 20px; }
    </style>
    <!-- Scaledrone JavaScript API referenced via Screenshot 2026-06-12 213127.png config -->
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
</head>
<body>

<div class="container">
    <!-- Screen 1: Join / Create Room -->
    <div id="login-view">
        <h2>Join Chat Room</h2>
        <input type="text" id="username-input" placeholder="Enter your name" required>
        <input type="text" id="room-input" placeholder="Enter Room Code (e.g., secret123)" required>
        <button onclick="joinRoom()">Connect & Join</button>

        <!-- Saved Rooms History List -->
        <div class="saved-rooms-section" id="saved-section" style="display: none;">
            <h4>Your Saved Rooms:</h4>
            <div class="room-tags" id="saved-rooms-list"></div>
        </div>
    </div>

    <!-- Screen 2: The Chat Interface -->
    <div id="chat-view">
        <div class="room-header" id="room-title">Room: </div>
        <div id="messages"></div>
        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="Type a message..." onkeypress="checkEnter(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    // Channel ID verified from Screenshot 2026-06-12 213127.png
    const CLIENT_ID = 'Xj9aMZvB6pZOVHuz'; 
    let drone = null;
    let roomName = '';
    let username = '';
    let room = null;

    // Load saved rooms when the page opens
    document.addEventListener('DOMContentLoaded', () => {
        displaySavedRooms();
    });

    function joinRoom() {
        username = document.getElementById('username-input').value.trim();
        const roomCode = document.getElementById('room-input').value.trim();

        if (!username || !roomCode) {
            alert('Please enter both a username and a room code.');
            return;
        }

        // Save room code to history
        saveRoomCode(roomCode);

        // Scaledrone room requirement
        roomName = 'observable-' + roomCode;

        // Initialize connection
        drone = new Scaledrone(CLIENT_ID, {
            data: { name: username }
        });

        drone.on('open', error => {
            if (error) return console.error(error);
            
            // Switch UI views
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('chat-view').style.display = 'flex';
            document.getElementById('room-title').innerText = `Logged in as: ${username} | Room: ${roomCode}`;

            setupRoom();
        });

        drone.on('error', error => console.error('Connection error:', error));
    }

    function setupRoom() {
        room = drone.subscribe(roomName);

        room.on('message', message => {
            const { data, member } = message;
            if (member) {
                displayMessage(data.text, member.clientData.name, member.id === drone.clientId);
            } else {
                displayMessage(data.text, 'Server', false);
            }
        });
    }

    function sendMessage() {
        const msgInput = document.getElementById('message-input');
        const text = msgInput.value.trim();
        if (text === '') return;

        drone.publish({
            room: roomName,
            message: { text: text }
        });

        msgInput.value = '';
    }

    function displayMessage(text, sender, isLocal) {
        const messagesDiv = document.getElementById('messages');
        const messageEl = document.createElement('div');
        
        messageEl.classList.add('message');
        messageEl.classList.add(isLocal ? 'local' : 'remote');
        messageEl.innerText = `${sender}: ${text}`;
        
        messagesDiv.appendChild(messageEl);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Storage logic to remember the room codes
    function saveRoomCode(code) {
        let rooms = JSON.parse(localStorage.getItem('chat_rooms')) || [];
        if (!rooms.includes(code)) {
            rooms.push(code);
            localStorage.setItem('chat_rooms', JSON.stringify(rooms));
        }
    }

    function displaySavedRooms() {
        const rooms = JSON.parse(localStorage.getItem('chat_rooms')) || [];
        const section = document.getElementById('saved-section');
        const listDiv = document.getElementById('saved-rooms-list');
        
        if (rooms.length > 0) {
            section.style.display = 'block';
            listDiv.innerHTML = '';
            rooms.forEach(roomCode => {
                const tag = document.createElement('span');
                tag.className = 'room-tag';
                tag.innerText = roomCode;
                // Clicking a tag fills out the box automatically
                tag.onclick = () => {
                    document.getElementById('room-input').value = roomCode;
                };
                listDiv.appendChild(tag);
            });
        }
    }

    function checkEnter(event) {
        if (event.key === 'Enter') sendMessage();
    }
</script>

</body>
</html>
